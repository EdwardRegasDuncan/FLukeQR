<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FLuke QR reader</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Inter,Arial,sans-serif;
}

body{
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:450px;
    background:white;
    border-radius:20px;
    padding:24px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#222;
}

#reader{
    border:3px solid #2563eb;
    border-radius:16px;
    overflow:hidden;
}

.status{
    margin-top:20px;
    padding:18px;
    border-radius:12px;
    text-align:center;
    font-size:26px;
    font-weight:bold;
    background:#eef2ff;
    color:#1f2937;
}

.valid{
    background:#dcfce7;
    color:#15803d;
    animation:pop .25s;
}

.invalid{
    background:#fee2e2;
    color:#b91c1c;
    animation:pop .25s;
}

button{
    margin-top:20px;
    width:100%;
    padding:18px;
    border:none;
    border-radius:14px;
    background:#2563eb;
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
}

button:active{
    transform:scale(.98);
}

button:hover{
    background:#1d4ed8;
}

.hidden{
    display:none;
}

@keyframes pop{
    0%{transform:scale(.9);}
    70%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

.flash-green{
    background:#22c55e !important;
}

.flash-red{
    background:#ef4444 !important;
}

.logo{
    display:flex;
    justify-content:center;
    margin-bottom:15px;
}

.logo img{
    width:100px;
    height:auto;
}

</style>

</head>

<body>

<div class="container">
    <div class="logo">
        <img src="FLukeLogo.png" alt="FLuke Logo">
    </div>

    <h1>QR reader</h1>

    <div id="reader"></div>

    <div id="status" class="status">
        Ready to scan
    </div>

</div>

<script>

const EXPECTED_CODE = "MY_SECRET_QR_2026";

let scanLocked = false;

const status = document.getElementById("status");

const scanner = new Html5QrcodeScanner(
    "reader",
    {
        fps:10,
        qrbox:250
    }
);

function flashScreen(color){

    document.body.classList.add(color);

    setTimeout(()=>{
        document.body.classList.remove(color);
    },300);

}

function onScanSuccess(decodedText){

    if(scanLocked) return;

    scanLocked = true;

    if(navigator.vibrate){
        navigator.vibrate(120);
    }

    if(decodedText === EXPECTED_CODE){

        status.className = "status valid";
        status.innerHTML = "✅ Welcome!";
        flashScreen("flash-green");

    } else {

        status.className = "status invalid";
        status.innerHTML = "❌ Invalid QR";
        flashScreen("flash-red");

    }

    // Automatically reset after 1 second
    setTimeout(() => {

        status.className = "status";
        status.innerHTML = "Ready to scan";

        scanLocked = false;

    }, 1000);
}

scanner.render(onScanSuccess);

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
